# .jenkins/workflows/ci.yaml — place this file in your consuming repo
#
# All fields are optional; omitted fields fall back to library defaults.
# Only override what you need.

name: "spark-lakehouse"
# Note: the agent label cannot be set here — it is passed in the Jenkinsfile:
# ciPipeline(agent: 'gradle-long-running')
# That pod template uses ghcr.io/openprojectx/jenkins-build-agent:latest as
# its all-in-one jnlp container, so no build.container sidecar is needed.

options:
  timeout: 45                    # minutes; default: 60
  disableConcurrentBuilds: true
  abortPreviousBuilds: true      # cancel older PR builds when new commit arrives
  buildsToKeep: 30

stages:

  # ── Checkout ────────────────────────────────────────────────────────────────
  checkout:
    enabled: true
    submodules: false
    lfs: false
    printCommitInfo: true

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    enabled: true
    tool: gradle                 # gradle | maven | nodejs
    gradle:
      tasks: "clean build -x test --info"
      # k8s all-in-one agent: selects JAVA17_HOME when present;
      # classic-agent fallback: Jenkins JDK tool "jdk-17"
      jdkVersion: "17"
      gradleOpts: "-Xmx2g -Dfile.encoding=UTF-8"
      proxy:
        host: 192.168.0.89
        port: 10809
        noProxy: "localhost,127.0.0.1,.svc.cluster.local,mirrors.tencent.com,maven.aliyun.com"
    # maven:
    #   goals: "clean package -DskipTests"
    #   mavenOpts: "-Xmx2g"
    #   profiles: ["ci"]
    # nodejs:
    #   nodeVersion: "20"
    #   packageManager: npm      # npm | yarn
    #   buildScript: build
    archiveArtifacts: "**/build/libs/*.jar"

  # ── Unit Test ────────────────────────────────────────────────────────────────
  unit-test:
    enabled: true
    gradle:
      tasks: "test --no-configuration-cache --info"
    reports:
      junit: "**/build/test-results/**/*.xml"

  # ── Scan ─────────────────────────────────────────────────────────────────────
  scan:
    sonar:
      enabled: false             # no SonarQube server configured in Jenkins yet
      serverName: SonarQube      # matches Jenkins SonarQube server name
      projectKey: "spark-lakehouse"
      qualityGateWait: true
      timeout: 5                 # minutes to wait for quality gate
    trivy:
      enabled: false             # no image registry yet
      severity: "CRITICAL,HIGH"
      exitCode: 1                # set to 0 to warn-only

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    enabled: false               # placeholder envs below (my-service) — enable once real charts exist
    kubeCredentialsId: kube-config-secret   # global fallback kubeconfig credential

    environments:

      - name: dev
        branches: ["develop", "feature/*"]
        tool: helm
        kubeCredentialsId: kube-config-dev  # per-env override
        helm:
          chart: "./charts/my-service"
          release: "my-service-dev"
          namespace: "dev"
          kubeContext: "dev-cluster"
          values:
            - values.yaml
            - values-dev.yaml
          set:
            image.tag: "${IMAGE_TAG}"
          extraArgs: "--wait --timeout 5m"

      - name: staging
        branches: ["main"]
        tool: kustomize
        kustomize:
          path: "./k8s/overlays/staging"
          namespace: "staging"
          kubeContext: "staging-cluster"

      - name: prod
        branches: ["main"]
        tool: helm
        helm:
          chart: "./charts/my-service"
          release: "my-service"
          namespace: "prod"
          kubeContext: "prod-cluster"
          values:
            - values.yaml
            - values-prod.yaml
          set:
            image.tag: "${IMAGE_TAG}"
          extraArgs: "--wait --timeout 10m --atomic"

  # ── Integration Test ─────────────────────────────────────────────────────────
  integration-test:
    enabled: false
    command: "make integration-test"
    timeout: 30
    reports:
      junit: "**/build/integration-test-results/**/*.xml"

  # ── PR Gate ───────────────────────────────────────────────────────────────────
  pr-gate:
    enabled: true
    provider: github             # github | bitbucket
    github:
      credentialsId: github-token
      statusContext: "ci/jenkins"
      requiredChecks: []         # additional required check names
    # bitbucket:
    #   credentialsId: bitbucket-token
    #   buildKey: jenkins-ci
